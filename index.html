<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>壱岐島 旅程プランナー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green: #1D9E75; --green-dark: #0F6E56; --green-light: #E1F5EE;
  --text: #1a1a1a; --text-muted: #666; --text-hint: #999;
  --border: #e5e5e5; --bg: #ffffff; --bg-surface: #f7f7f5;
  --radius: 8px; --radius-lg: 12px;
}
body { font-family: 'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background: var(--bg-surface); color: var(--text); min-height: 100vh; }
.container { max-width: 760px; margin: 0 auto; padding: 2rem 1rem 4rem; }
.hero { text-align: center; padding: 2.5rem 1rem 2rem; background: linear-gradient(160deg,#0a5c43 0%,#1D9E75 60%,#5DCAA5 100%); color: white; border-radius: var(--radius-lg); margin-bottom: 2rem; }
.hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 0.5rem; }
.hero p { font-size: 14px; opacity: 0.85; }
.card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }

/* IN/OUT セクション */
.inout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.inout-col { background: var(--bg-surface); border-radius: var(--radius); padding: 1rem; }
.inout-label { font-size: 12px; font-weight: 700; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 6px; }
.inout-label.in { color: #1D9E75; }
.inout-label.out { color: #E07A30; }
.inout-arrow { font-size: 16px; }
.select-row { margin-bottom: 8px; }
.select-row label { font-size: 11px; color: var(--text-muted); display: block; margin-bottom: 3px; }
.select-row select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; background: var(--bg); color: var(--text); }

/* スポット */
.cat-section { margin-bottom: 1.25rem; }
.cat-label { font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.spots-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(130px,1fr)); gap: 7px; }
.spot-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 11px; cursor: pointer; transition: all 0.15s; background: var(--bg); user-select: none; }
.spot-card:hover { border-color: var(--green); background: var(--green-light); }
.spot-card.selected { border: 2px solid var(--green); background: var(--green-light); }
.spot-card.selected .spot-name { color: var(--green-dark); }
.spot-icon { font-size: 16px; margin-bottom: 3px; }
.spot-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 2px; }
.spot-meta { font-size: 10px; color: var(--text-hint); }

/* 条件 */
.config-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.config-item label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
.config-item select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); }

.plan-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s,transform 0.1s; margin-bottom: 1.25rem; }
.plan-btn:hover:not(:disabled) { background: var(--green-dark); transform: translateY(-1px); }
.plan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.result-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; }
.result-placeholder { text-align: center; padding: 2rem; color: var(--text-hint); font-size: 14px; }
.loading { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 2rem; }
.loading span { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: bounce 1.2s infinite; }
.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1} }

.plan-summary { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
.plan-summary-title { font-size: 16px; font-weight: 700; }
.pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg-surface); }
.day-header { font-size: 12px; font-weight: 700; color: var(--green-dark); background: var(--green-light); padding: 5px 12px; border-radius: var(--radius); margin: 1rem 0 0.6rem; display: inline-block; }
.stop { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.stop-time { font-size: 11px; color: var(--text-hint); min-width: 38px; padding-top: 3px; }
.stop-body { flex: 1; background: var(--bg-surface); border-radius: var(--radius); padding: 8px 12px; border-left: 3px solid var(--green); }
.stop-body.port { border-left-color: #E07A30; }
.stop-name { font-size: 13px; font-weight: 700; }
.stop-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.cost-box { background: var(--bg-surface); border-radius: var(--radius); padding: 1rem 1.25rem; margin-top: 1.25rem; }
.cost-title { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
.cost-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; color: var(--text-muted); }
.cost-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; padding-top: 8px; margin-top: 6px; border-top: 1px solid var(--border); }
.tip { margin-top: 1rem; padding: 10px 14px; background: #FAEEDA; border-radius: var(--radius); font-size: 12px; color: #633806; line-height: 1.6; }
.error { background: #FCEBEB; border: 1px solid #F7C1C1; border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: #A32D2D; line-height: 1.6; }
.sel-count { font-size: 12px; color: var(--text-muted); margin-top: 0.75rem; }
.sel-count strong { color: var(--green); }
@media (max-width: 540px) {
  .config-grid { grid-template-columns: 1fr; }
  .inout-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>🌊 壱岐島 旅程プランナー</h1>
    <p>行きたいスポットを選ぶだけで、AIが最適な旅程を提案します</p>
  </div>

  <!-- IN/OUT -->
  <div class="card">
    <p class="card-title">到着・出発の情報</p>
    <div class="inout-grid">
      <div class="inout-col">
        <div class="inout-label in">🛳 到着（IN）</div>
        <div class="select-row">
          <label>到着港・空港</label>
          <select id="arrival-port">
            <option value="郷ノ浦港">郷ノ浦港</option>
            <option value="芦辺港">芦辺港</option>
            <option value="印通寺港">印通寺港</option>
            <option value="壱岐空港">壱岐空港</option>
          </select>
        </div>
        <div class="select-row">
          <label>到着時刻</label>
          <select id="arrival-time">
            <option value="7:30">7:30頃</option>
            <option value="8:00">8:00頃</option>
            <option value="8:30">8:30頃</option>
            <option value="9:00" selected>9:00頃</option>
            <option value="9:30">9:30頃</option>
            <option value="10:00">10:00頃</option>
            <option value="11:00">11:00頃</option>
            <option value="12:00">12:00頃</option>
            <option value="13:00">13:00頃</option>
            <option value="14:00">14:00頃</option>
          </select>
        </div>
      </div>
      <div class="inout-col">
        <div class="inout-label out">🛳 出発（OUT）</div>
        <div class="select-row">
          <label>出発港・空港</label>
          <select id="departure-port">
            <option value="郷ノ浦港">郷ノ浦港</option>
            <option value="芦辺港">芦辺港</option>
            <option value="印通寺港">印通寺港</option>
            <option value="壱岐空港">壱岐空港</option>
          </select>
        </div>
        <div class="select-row">
          <label>最終出発時刻（最終日）</label>
          <select id="departure-time">
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00">14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00" selected>17:00</option>
            <option value="17:45">17:45</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- スポット選択 -->
  <div class="card">
    <p class="card-title">観光スポットを選んでください（複数選択可）</p>
    <div id="spots-container"></div>
    <p class="sel-count" id="sel-count"><strong>0件</strong>選択中</p>
  </div>

  <!-- 旅行条件 -->
  <div class="card">
    <p class="card-title">旅行条件</p>
    <div class="config-grid">
      <div class="config-item">
        <label>移動手段</label>
        <select id="transport">
          <option value="レンタカー">レンタカー</option>
          <option value="路線バス・タクシー">路線バス・タクシー</option>
          <option value="レンタルバイク">レンタルバイク</option>
          <option value="レンタサイクル">レンタサイクル</option>
        </select>
      </div>
      <div class="config-item">
        <label>旅行日数</label>
        <select id="days">
          <option value="日帰り（1日）">日帰り</option>
          <option value="1泊2日" selected>1泊2日</option>
          <option value="2泊3日">2泊3日</option>
        </select>
      </div>
      <div class="config-item">
        <label>人数</label>
        <select id="people">
          <option value="1">1名</option>
          <option value="2" selected>2名</option>
          <option value="3">3名</option>
          <option value="4">4名以上</option>
        </select>
      </div>
    </div>
  </div>

  <button class="plan-btn" id="plan-btn" disabled onclick="generatePlan()">スポットを選択してください</button>

  <div class="result-card" id="result">
    <p class="result-placeholder">✈️ スポットを選んで旅程を作成してください</p>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: "scenic",      label: "🏔 景勝地",    color: "#E8F4FD", border: "#90C8F0" },
  { id: "beach",       label: "🏖 海・ビーチ", color: "#E1F5EE", border: "#6DCFAA" },
  { id: "sightseeing", label: "🎡 観光",       color: "#FEF3E2", border: "#F7C16A" },
  { id: "kofun",       label: "🗿 古墳",       color: "#F3EEF8", border: "#C9A8E8" },
  { id: "sake",        label: "🍶 お酒",       color: "#FFF0F0", border: "#F4A8A8" },
  { id: "onsen",       label: "♨ 温泉",        color: "#FFF5E1", border: "#F5C97A" },
  { id: "shrine",      label: "⛩ 神社",       color: "#F0F7EE", border: "#8DC87A" },
];
const SPOTS = [
  { id:"saruku",         name:"猿岩",              icon:"🪨", time:30,  fee:"無料",                                  cat:"scenic" },
  { id:"oninoashiato",   name:"鬼の足跡",           icon:"🌊", time:30,  fee:"無料",                                  cat:"scenic" },
  { id:"leftos",         name:"左京鼻",             icon:"🌄", time:30,  fee:"無料",                                  cat:"scenic" },
  { id:"takenotsuji",    name:"岳ノ辻展望台",       icon:"🗻", time:45,  fee:"無料",                                  cat:"scenic" },
  { id:"kurosakihohdai", name:"黒崎砲台跡",         icon:"🏰", time:40,  fee:"無料",                                  cat:"scenic" },
  { id:"dodaiishi",      name:"壱岐の土台石",       icon:"🪨", time:20,  fee:"無料",                                  cat:"scenic" },
  { id:"katsumoto",      name:"勝本城跡",           icon:"🏯", time:30,  fee:"無料",                                  cat:"scenic" },
  { id:"jagatani",       name:"蛇ヶ谷",             icon:"🌿", time:30,  fee:"無料",                                  cat:"scenic" },
  { id:"tsutsukihama",   name:"筒城浜",             icon:"🏖", time:90,  fee:"無料",                                  cat:"beach" },
  { id:"nishihama",      name:"錦浜",               icon:"🏝", time:60,  fee:"無料",                                  cat:"beach" },
  { id:"ohama",          name:"大浜",               icon:"🌊", time:60,  fee:"無料",                                  cat:"beach" },
  { id:"kiyoishihama",   name:"清石浜",             icon:"🐚", time:60,  fee:"無料",                                  cat:"beach" },
  { id:"satohama",       name:"里浜",               icon:"🏄", time:60,  fee:"無料",                                  cat:"beach" },
  { id:"tatsunoshima",   name:"辰の島（渡船のみ）", icon:"🏝", time:120, fee:"大人1000円・小人500円",                  cat:"beach" },
  { id:"twins",          name:"ツインズビーチ",     icon:"🌅", time:45,  fee:"無料",                                  cat:"beach" },
  { id:"haranotsuji",    name:"原の辻遺跡",         icon:"🏛", time:60,  fee:"無料",                                  cat:"sightseeing" },
  { id:"ikikoku",        name:"一支国博物館",        icon:"🏛", time:90,  fee:"一般410円・高校生310円・小中学生210円",  cat:"sightseeing" },
  { id:"iruka",          name:"壱岐イルカパーク",   icon:"🐬", time:120, fee:"大人1000円・中学生以下500円・未就学児無料", cat:"sightseeing" },
  { id:"harahoge",       name:"はらほげ地蔵",       icon:"🪷", time:20,  fee:"無料",                                  cat:"sightseeing" },
  { id:"tatsu_cruise",   name:"辰の島遊覧",         icon:"🚢", time:60,  fee:"大人2000円・小人1000円",                 cat:"sightseeing" },
  { id:"ajisai",         name:"壱岐あじさいパーク", icon:"💐", time:60,  fee:"大人300円・小中学生200円・幼児無料",      cat:"sightseeing" },
  { id:"olive",          name:"壱岐オリーブ園",     icon:"🫒", time:45,  fee:"無料",                                  cat:"sightseeing" },
  { id:"banana",         name:"バナナファーム壱岐",  icon:"🍌", time:60,  fee:"無料",                                  cat:"sightseeing" },
  { id:"oninokukuri",    name:"鬼の窟古墳",         icon:"🗿", time:20,  fee:"無料",                                  cat:"kofun" },
  { id:"sugoroku",       name:"双六古墳",           icon:"🗿", time:20,  fee:"無料",                                  cat:"kofun" },
  { id:"kakeki",         name:"掛貴古墳",           icon:"🗿", time:20,  fee:"無料",                                  cat:"kofun" },
  { id:"genkai",         name:"玄海酒造",           icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"ikinokura",      name:"壱岐の蔵酒造",       icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"ikinohana",      name:"壱岐の華",           icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"sarukawa",       name:"猿川伊豆酒造",       icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"yamanomori",     name:"山の守酒造",         icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"amanokawa",      name:"天の川酒造",         icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"omoya",          name:"重家酒造",           icon:"🍶", time:45,  fee:"",                                      cat:"sake" },
  { id:"islandbrew",     name:"アイランドブルワリー",icon:"🍺", time:45,  fee:"",                                      cat:"sake" },
  { id:"yunomoto",       name:"湯本温泉",           icon:"♨",  time:60,  fee:"",                                      cat:"onsen" },
  { id:"yukawa",         name:"湯川温泉",           icon:"♨",  time:60,  fee:"",                                      cat:"onsen" },
  { id:"tsukiyomi",      name:"月讀神社",           icon:"⛩", time:30,  fee:"無料",                                  cat:"shrine" },
  { id:"otake",          name:"男岳神社",           icon:"⛩", time:30,  fee:"無料",                                  cat:"shrine" },
  { id:"metake",         name:"女岳神社",           icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"sumiyoshi",      name:"住吉神社",           icon:"⛩", time:30,  fee:"無料",                                  cat:"shrine" },
  { id:"ikijinja",       name:"壱岐神社",           icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"ojima",          name:"小島神社",           icon:"🌊", time:45,  fee:"無料",                                  cat:"shrine" },
  { id:"tentagao",       name:"天手長男神社",       icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"seibomiya",      name:"聖母宮",             icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"saegami",        name:"塞神社",             icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"ryuja",          name:"龍蛇神社",           icon:"🐍", time:20,  fee:"無料",                                  cat:"shrine" },
  { id:"shirasuna",      name:"白沙八幡神社",       icon:"⛩", time:20,  fee:"無料",                                  cat:"shrine" },
];

let selected = new Set();

function renderSpots() {
  document.getElementById("spots-container").innerHTML = CATEGORIES.map(cat => {
    const catSpots = SPOTS.filter(s => s.cat === cat.id);
    return `<div class="cat-section">
      <span class="cat-label" style="background:${cat.color};border:1px solid ${cat.border}">${cat.label}</span>
      <div class="spots-grid">
        ${catSpots.map(s => `
          <div class="spot-card${selected.has(s.id) ? " selected" : ""}" onclick="toggleSpot('${s.id}')">
            <div class="spot-icon">${s.icon}</div>
            <div class="spot-name">${s.name}</div>
            <div class="spot-meta">約${s.time}分${s.fee ? " · " + s.fee : ""}</div>
          </div>`).join("")}
      </div>
    </div>`;
  }).join("");
}

function toggleSpot(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  renderSpots();
  const n = selected.size;
  document.getElementById("sel-count").innerHTML = `<strong>${n}件</strong>選択中`;
  const btn = document.getElementById("plan-btn");
  btn.disabled = n === 0;
  btn.textContent = n > 0 ? `🗓 選択した${n}スポットで旅程を作成` : "スポットを選択してください";
}

async function generatePlan() {
  const btn = document.getElementById("plan-btn");
  btn.disabled = true;
  document.getElementById("result").innerHTML = `<div class="loading"><span></span><span></span><span></span></div>`;

  const transport = document.getElementById("transport").value;
  const days = document.getElementById("days").value;
  const people = document.getElementById("people").value;
  const arrivalPort = document.getElementById("arrival-port").value;
  const arrivalTime = document.getElementById("arrival-time").value;
  const departurePort = document.getElementById("departure-port").value;
  const departureTime = document.getElementById("departure-time").value;
  const spotList = SPOTS.filter(s => selected.has(s.id));

  try {
    const res = await fetch("/api/plan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ spots: spotList, transport, days, people, arrivalPort, arrivalTime, departurePort, departureTime })
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error || `HTTP ${res.status}`); }
    const plan = await res.json();
    renderPlan(plan, people, arrivalPort, arrivalTime, departurePort, departureTime);
  } catch(e) {
    document.getElementById("result").innerHTML = `<div class="error">⚠️ エラー: ${e.message}</div>`;
  }
  btn.disabled = false;
  btn.textContent = `🗓 選択した${selected.size}スポットで旅程を作成`;
}

function renderPlan(plan, people, arrivalPort, arrivalTime, departurePort, departureTime) {
  let html = `<div class="plan-summary">
    <div class="plan-summary-title">${plan.summary || "旅程プラン"}</div>
    <div class="pills">
      <span class="pill">🛳 ${arrivalPort} ${arrivalTime}着</span>
      <span class="pill">🏁 ${departurePort} ${departureTime}発</span>
      <span class="pill">${people}名</span>
    </div>
  </div>`;

  (plan.days || []).forEach(d => {
    html += `<div class="day-header">Day ${d.day} — ${d.title}</div>`;
    (d.spots || []).forEach(s => {
      const isPort = s.name.includes("港") || s.name.includes("空港") || s.name.includes("チェックイン") || s.name.includes("チェックアウト");
      html += `<div class="stop">
        <div class="stop-time">${s.time}</div>
        <div class="stop-body${isPort ? " port" : ""}">
          <div class="stop-name">${s.name}</div>
          <div class="stop-detail">${s.detail} · ${s.duration}</div>
        </div>
      </div>`;
    });
  });

  if (plan.costs) {
    html += `<div class="cost-box"><div class="cost-title">費用目安</div>
      <div class="cost-row"><span>移動費（1名）</span><span>${plan.costs.transport}</span></div>
      <div class="cost-row"><span>入場料（1名）</span><span>${plan.costs.admission}</span></div>
      <div class="cost-row"><span>食事代（1名）</span><span>${plan.costs.meal}</span></div>
      <div class="cost-total"><span>合計（${people}名）</span><span>${plan.costs.total}</span></div>
    </div>`;
  }
  if (plan.tips) html += `<div class="tip">💡 ${plan.tips}</div>`;
  document.getElementById("result").innerHTML = html;
}

renderSpots();
</script>
</body>
</html>
